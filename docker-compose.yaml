# DEPLOYMENT NOTES FOR COOLIFY
# Public traffic terminates at liferadar.nothing.pink only.
# MCP is exposed via the API proxy at /mcp, not a separate subdomain.
# Required DNS:
#   - liferadar.nothing.pink → server IP

services:
  life-radar-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: life-radar-api
    environment:
      LIFE_RADAR_DB_HOST: "${LIFE_RADAR_DB_HOST:-host.docker.internal}"
      LIFE_RADAR_DB_PORT: "${LIFE_RADAR_DB_PORT:-5432}"
      LIFE_RADAR_DB_NAME: "${LIFE_RADAR_DB_NAME:-life_radar}"
      LIFE_RADAR_DB_USER: "${LIFE_RADAR_DB_USER:-life_radar}"
      LIFE_RADAR_DB_PASSWORD: "${LIFE_RADAR_DB_PASSWORD:-}"
      LIFE_RADAR_API_KEY: "${LIFE_RADAR_API_KEY:-}"
      LIFE_RADAR_MATRIX_BRIDGE_URL: http://life-radar-matrix-bridge:8010
    expose:
      - "8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.liferadar-compose-api.rule=Host(`liferadar.nothing.pink`)"
      - "traefik.http.routers.liferadar-compose-api.entrypoints=https"
      - "traefik.http.routers.liferadar-compose-api.tls=true"
      - "traefik.http.routers.liferadar-compose-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.liferadar-compose-api.loadbalancer.server.port=8000"
      - "traefik.docker.network=coolify"
    networks:
      - coolify
    restart: unless-stopped

  life-radar-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: life-radar-mcp
    environment:
      LIFE_RADAR_DB_HOST: "${LIFE_RADAR_DB_HOST:-host.docker.internal}"
      LIFE_RADAR_DB_PORT: "${LIFE_RADAR_DB_PORT:-5432}"
      LIFE_RADAR_DB_NAME: "${LIFE_RADAR_DB_NAME:-life_radar}"
      LIFE_RADAR_DB_USER: "${LIFE_RADAR_DB_USER:-life_radar}"
      LIFE_RADAR_DB_PASSWORD: "${LIFE_RADAR_DB_PASSWORD:-}"
      LIFE_RADAR_API_URL: http://life-radar-api:8000
      LIFE_RADAR_PUBLIC_API_URL: "${LIFE_RADAR_PUBLIC_API_URL:-}"
      LIFE_RADAR_API_KEY: "${LIFE_RADAR_API_KEY:-}"
      OUTLOOK_MCP_ENABLED: "${OUTLOOK_MCP_ENABLED:-false}"
      MS365_MCP_CLIENT_ID: "${MS365_MCP_CLIENT_ID:-}"
      MS365_MCP_CLIENT_SECRET: "${MS365_MCP_CLIENT_SECRET:-}"
      MS365_MCP_TENANT_ID: "${MS365_MCP_TENANT_ID:-common}"
    volumes:
      - outlook-mcp-tokens:/app/outlook-token-cache
    expose:
      - "8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - coolify
    restart: unless-stopped
    depends_on:
      - life-radar-api

  life-radar-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: life-radar-worker
    environment:
      LIFE_RADAR_DB_HOST: "${LIFE_RADAR_DB_HOST:-host.docker.internal}"
      LIFE_RADAR_DB_PORT: "${LIFE_RADAR_DB_PORT:-5432}"
      LIFE_RADAR_DB_NAME: "${LIFE_RADAR_DB_NAME:-life_radar}"
      LIFE_RADAR_DB_USER: "${LIFE_RADAR_DB_USER:-life_radar}"
      LIFE_RADAR_DB_PASSWORD: "${LIFE_RADAR_DB_PASSWORD:-}"
      MATRIX_SESSION_PATH: "${MATRIX_SESSION_PATH:-}"
      MATRIX_RUST_SESSION_PATH: "${MATRIX_RUST_SESSION_PATH:-}"
      MATRIX_RUST_STORE: "${MATRIX_RUST_STORE:-}"
      MATRIX_E2EE_EXPORT_PATH: "${MATRIX_E2EE_EXPORT_PATH:-}"
      MATRIX_E2EE_EXPORT_PASSPHRASE_PATH: "${MATRIX_E2EE_EXPORT_PASSPHRASE_PATH:-}"
      MATRIX_RUST_KEY_IMPORT_MARKER: "${MATRIX_RUST_KEY_IMPORT_MARKER:-}"
      LIFE_RADAR_MATRIX_RUST_CANDIDATE_ID: "${LIFE_RADAR_MATRIX_RUST_CANDIDATE_ID:-matrix-rust-sdk}"
      LIFE_RADAR_MATRIX_RUST_CANDIDATE_TYPE: "${LIFE_RADAR_MATRIX_RUST_CANDIDATE_TYPE:-matrix-native}"
      LIFE_RADAR_MATRIX_RUST_TIMEOUT_SEC: "${LIFE_RADAR_MATRIX_RUST_TIMEOUT_SEC:-20}"
      LIFE_RADAR_MATRIX_RUST_RECOVER_HTTP_ON_FAILURE: "${LIFE_RADAR_MATRIX_RUST_RECOVER_HTTP_ON_FAILURE:-0}"
      MSGRAPH_CLIENT_ID: "${MSGRAPH_CLIENT_ID:-}"
      MSGRAPH_CLIENT_SECRET: "${MSGRAPH_CLIENT_SECRET:-}"
      MSGRAPH_TENANT_ID: "${MSGRAPH_TENANT_ID:-}"
      MSGRAPH_REFRESH_TOKEN: "${MSGRAPH_REFRESH_TOKEN:-}"
      GOOGLE_CALENDAR_CLIENT_ID: "${GOOGLE_CALENDAR_CLIENT_ID:-}"
      GOOGLE_CALENDAR_CLIENT_SECRET: "${GOOGLE_CALENDAR_CLIENT_SECRET:-}"
      GOOGLE_CALENDAR_REFRESH_TOKEN: "${GOOGLE_CALENDAR_REFRESH_TOKEN:-}"
      GOOGLE_CALENDAR_ID: "${GOOGLE_CALENDAR_ID:-primary}"
    expose:
      - "8080"
    volumes:
      - "${LIFE_RADAR_IDENTITY_DIR:-/data/life-radar/identity}:/app/identity"
      - "${LIFE_RADAR_WORKSPACE_DIR:-/data/life-radar/workspace}:/app/workspace"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - coolify
    restart: unless-stopped

  life-radar-matrix-bridge:
    build:
      context: .
      dockerfile: Dockerfile.matrix-bridge
    container_name: life-radar-matrix-bridge
    environment:
      LIFE_RADAR_DB_HOST: "${LIFE_RADAR_DB_HOST:-host.docker.internal}"
      LIFE_RADAR_DB_PORT: "${LIFE_RADAR_DB_PORT:-5432}"
      LIFE_RADAR_DB_NAME: "${LIFE_RADAR_DB_NAME:-life_radar}"
      LIFE_RADAR_DB_USER: "${LIFE_RADAR_DB_USER:-life_radar}"
      LIFE_RADAR_DB_PASSWORD: "${LIFE_RADAR_DB_PASSWORD:-}"
    expose:
      - "8010"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - coolify
    restart: unless-stopped

volumes:
  outlook-mcp-tokens:

networks:
  coolify:
    external: true
    name: coolify
