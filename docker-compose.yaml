services:
  # DB is external (liferadar-db Coolify service)
  life-radar-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: life-radar-api
    environment:
      LIFE_RADAR_DB_HOST: host.docker.internal
      LIFE_RADAR_DB_PORT: "5432"
      LIFE_RADAR_DB_NAME: ${LIFE_RADAR_DB_NAME:-liferadar}
      LIFE_RADAR_DB_USER: ${LIFE_RADAR_DB_USER:-liferadar}
      LIFE_RADAR_DB_PASSWORD: ${LIFE_RADAR_DB_PASSWORD}
    expose:
      - "8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.liferadar-api.rule=Host(`liferadar.nothing.pink`)"
      - "traefik.http.routers.liferadar-api.entrypoints=https"
      - "traefik.http.routers.liferadar-api.tls=true"
      - "traefik.http.services.liferadar-api.loadbalancer.server.port=8000"
    networks:
      - life-radar-net
    restart: unless-stopped

  life-radar-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: life-radar-mcp
    environment:
      LIFE_RADAR_DB_HOST: host.docker.internal
      LIFE_RADAR_DB_PORT: "5432"
      LIFE_RADAR_DB_NAME: ${LIFE_RADAR_DB_NAME:-liferadar}
      LIFE_RADAR_DB_USER: ${LIFE_RADAR_DB_USER:-liferadar}
      LIFE_RADAR_DB_PASSWORD: ${LIFE_RADAR_DB_PASSWORD}
      LIFE_RADAR_API_URL: http://liferadar-api:8000
    expose:
      - "8090"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.liferadar-mcp-sse.rule=PathPrefix(/sse)"
      - "traefik.http.routers.liferadar-mcp-sse.entrypoints=https"
      - "traefik.http.routers.liferadar-mcp-sse.tls=true"
      - "traefik.http.routers.liferadar-mcp-sse.priority=100"
      - "traefik.http.services.liferadar-mcp-sse.loadbalancer.server.port=8090"
      - "traefik.http.routers.liferadar-mcp-messages.rule=PathPrefix(/messages)"
      - "traefik.http.routers.liferadar-mcp-messages.entrypoints=https"
      - "traefik.http.routers.liferadar-mcp-messages.tls=true"
      - "traefik.http.routers.liferadar-mcp-messages.priority=100"
      - "traefik.http.services.liferadar-mcp-messages.loadbalancer.server.port=8090"
      - "traefik.http.routers.liferadar-mcp-health.rule=PathPrefix(/health)"
      - "traefik.http.routers.liferadar-mcp-health.entrypoints=https"
      - "traefik.http.routers.liferadar-mcp-health.tls=true"
      - "traefik.http.routers.liferadar-mcp-health.priority=100"
      - "traefik.http.services.liferadar-mcp-health.loadbalancer.server.port=8090"
    networks:
      - life-radar-net
    restart: unless-stopped

networks:
  life-radar-net:
    driver: bridge
