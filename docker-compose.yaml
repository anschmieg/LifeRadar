# DEPLOYMENT NOTES FOR COOLIFY
# Public traffic terminates at liferadar.nothing.pink only.
# MCP is exposed via the API proxy at /mcp, not a separate subdomain.
# Required DNS:
#   - liferadar.nothing.pink → server IP

services:
  life-radar-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: life-radar-api
    environment:
      LIFE_RADAR_DB_HOST: "${LIFE_RADAR_DB_HOST:-host.docker.internal}"
      LIFE_RADAR_DB_PORT: "${LIFE_RADAR_DB_PORT:-5432}"
      LIFE_RADAR_DB_NAME: "${LIFE_RADAR_DB_NAME:-life_radar}"
      LIFE_RADAR_DB_USER: "${LIFE_RADAR_DB_USER:-life_radar}"
      LIFE_RADAR_DB_PASSWORD: "${LIFE_RADAR_DB_PASSWORD:-}"
      LIFE_RADAR_API_KEY: "${LIFE_RADAR_API_KEY:-}"
      LIFE_RADAR_MATRIX_BRIDGE_URL: http://life-radar-matrix-bridge:8010
    expose:
      - "8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.liferadar-compose-api.rule=Host(`liferadar.nothing.pink`)"
      - "traefik.http.routers.liferadar-compose-api.entrypoints=https"
      - "traefik.http.routers.liferadar-compose-api.tls=true"
      - "traefik.http.routers.liferadar-compose-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.liferadar-compose-api.loadbalancer.server.port=8000"
      - "traefik.docker.network=coolify"
    networks:
      - coolify
    restart: unless-stopped

  life-radar-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: life-radar-mcp
    environment:
      LIFE_RADAR_DB_HOST: "${LIFE_RADAR_DB_HOST:-host.docker.internal}"
      LIFE_RADAR_DB_PORT: "${LIFE_RADAR_DB_PORT:-5432}"
      LIFE_RADAR_DB_NAME: "${LIFE_RADAR_DB_NAME:-life_radar}"
      LIFE_RADAR_DB_USER: "${LIFE_RADAR_DB_USER:-life_radar}"
      LIFE_RADAR_DB_PASSWORD: "${LIFE_RADAR_DB_PASSWORD:-}"
      LIFE_RADAR_API_URL: http://life-radar-api:8000
      LIFE_RADAR_API_KEY: "${LIFE_RADAR_API_KEY:-}"
    expose:
      - "8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - coolify
    restart: unless-stopped
    depends_on:
      - life-radar-api

  life-radar-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: life-radar-worker
    environment:
      LIFE_RADAR_DB_HOST: "${LIFE_RADAR_DB_HOST:-host.docker.internal}"
      LIFE_RADAR_DB_PORT: "${LIFE_RADAR_DB_PORT:-5432}"
      LIFE_RADAR_DB_NAME: "${LIFE_RADAR_DB_NAME:-life_radar}"
      LIFE_RADAR_DB_USER: "${LIFE_RADAR_DB_USER:-life_radar}"
      LIFE_RADAR_DB_PASSWORD: "${LIFE_RADAR_DB_PASSWORD:-}"
      LIFE_RADAR_MATRIX_RUST_RECOVER_HTTP_ON_FAILURE: "${LIFE_RADAR_MATRIX_RUST_RECOVER_HTTP_ON_FAILURE:-0}"
    expose:
      - "8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - coolify
    restart: unless-stopped

  life-radar-matrix-bridge:
    build:
      context: .
      dockerfile: Dockerfile.matrix-bridge
    container_name: life-radar-matrix-bridge
    environment:
      LIFE_RADAR_DB_HOST: "${LIFE_RADAR_DB_HOST:-host.docker.internal}"
      LIFE_RADAR_DB_PORT: "${LIFE_RADAR_DB_PORT:-5432}"
      LIFE_RADAR_DB_NAME: "${LIFE_RADAR_DB_NAME:-life_radar}"
      LIFE_RADAR_DB_USER: "${LIFE_RADAR_DB_USER:-life_radar}"
      LIFE_RADAR_DB_PASSWORD: "${LIFE_RADAR_DB_PASSWORD:-}"
    expose:
      - "8010"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - coolify
    restart: unless-stopped

networks:
  coolify:
    external: true
    name: coolify
