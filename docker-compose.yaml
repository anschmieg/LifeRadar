services:
  # DB is external (liferadar-db Coolify service)
  life-radar-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: life-radar-api
    environment:
      LIFE_RADAR_DB_HOST: ${LIFE_RADAR_DB_HOST:-localhost}
      LIFE_RADAR_DB_PORT: "5432"
      LIFE_RADAR_DB_NAME: ${LIFE_RADAR_DB_NAME:-liferadar}
      LIFE_RADAR_DB_USER: ${LIFE_RADAR_DB_USER:-liferadar}
      LIFE_RADAR_DB_PASSWORD: ${LIFE_RADAR_DB_PASSWORD}
    expose:
      - "8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.liferadar-api.rule=Host(`liferadar.nothing.pink`)"
      - "traefik.http.routers.liferadar-api.entrypoints=http"
      - "traefik.http.services.liferadar-api.loadbalancer.server.port=8000"
    networks:
      - life-radar-net
    restart: unless-stopped

  life-radar-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: life-radar-mcp
    environment:
      LIFE_RADAR_DB_HOST: ${LIFE_RADAR_DB_HOST:-localhost}
      LIFE_RADAR_DB_PORT: "5432"
      LIFE_RADAR_DB_NAME: ${LIFE_RADAR_DB_NAME:-liferadar}
      LIFE_RADAR_DB_USER: ${LIFE_RADAR_DB_USER:-liferadar}
      LIFE_RADAR_DB_PASSWORD: ${LIFE_RADAR_DB_PASSWORD}
      LIFE_RADAR_API_URL: http://liferadar-api:8000
    expose:
      - "8090"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.liferadar-mcp.rule=Host(`liferadar.nothing.pink`) && PathPrefix(`/mcp`)"
      - "traefik.http.routers.liferadar-mcp.entrypoints=http"
      - "traefik.http.services.liferadar-mcp.loadbalancer.server.port=8090"
    networks:
      - life-radar-net
    restart: unless-stopped

networks:
  life-radar-net:
    driver: bridge