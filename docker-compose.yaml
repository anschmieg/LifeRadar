# Production deployment uses explicit host bind mounts under /data/liferadar.
# Local development should use docker-compose.local.yaml instead.

services:
  liferadar-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: liferadar-api
    environment:
      LIFERADAR_DB_HOST: "${LIFERADAR_DB_HOST}"
      LIFERADAR_DB_PORT: "${LIFERADAR_DB_PORT}"
      LIFERADAR_DB_NAME: "${LIFERADAR_DB_NAME}"
      LIFERADAR_DB_USER: "${LIFERADAR_DB_USER}"
      LIFERADAR_DB_PASSWORD: "${LIFERADAR_DB_PASSWORD}"
      LIFERADAR_API_KEY: "${LIFERADAR_API_KEY}"
      LIFERADAR_MATRIX_BRIDGE_URL: http://liferadar-matrix-bridge:8010
      LIFERADAR_CHAT_GATEWAY_URL: http://liferadar-chat-gateway:8020
      LIFERADAR_MATRIX_ENABLED: "${LIFERADAR_MATRIX_ENABLED:-true}"
      LIFERADAR_MATRIX_HOMESERVER_URL: "${LIFERADAR_MATRIX_HOMESERVER_URL:-}"
      MATRIX_RUST_SESSION_PATH: "${MATRIX_RUST_SESSION_PATH:-/app/identity/matrix-session.json}"
      MATRIX_RUST_STORE: "${MATRIX_RUST_STORE:-/app/identity/matrix-rust-sdk-store}"
    volumes:
      - ${LIFERADAR_DATA_ROOT:-/data/liferadar}/identity:/app/identity
    expose:
      - "8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.liferadar-compose-api.rule=Host(`liferadar.nothing.pink`)"
      - "traefik.http.routers.liferadar-compose-api.entrypoints=https"
      - "traefik.http.routers.liferadar-compose-api.tls=true"
      - "traefik.http.routers.liferadar-compose-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.liferadar-compose-api.loadbalancer.server.port=8000"
      - "traefik.docker.network=coolify"
    networks:
      - coolify
    restart: unless-stopped

  liferadar-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: liferadar-mcp
    environment:
      LIFERADAR_DB_HOST: "${LIFERADAR_DB_HOST}"
      LIFERADAR_DB_PORT: "${LIFERADAR_DB_PORT}"
      LIFERADAR_DB_NAME: "${LIFERADAR_DB_NAME}"
      LIFERADAR_DB_USER: "${LIFERADAR_DB_USER}"
      LIFERADAR_DB_PASSWORD: "${LIFERADAR_DB_PASSWORD}"
      LIFERADAR_API_URL: http://liferadar-api:8000
      LIFERADAR_PUBLIC_API_URL: "${LIFERADAR_PUBLIC_API_URL}"
      LIFERADAR_API_KEY: "${LIFERADAR_API_KEY}"
      OUTLOOK_MCP_ENABLED: "${OUTLOOK_MCP_ENABLED}"
      MSGRAPH_CLIENT_ID: "${MSGRAPH_CLIENT_ID}"
      MSGRAPH_CLIENT_SECRET: "${MSGRAPH_CLIENT_SECRET}"
      MSGRAPH_TENANT_ID: "${MSGRAPH_TENANT_ID}"
    volumes:
      - ${LIFERADAR_DATA_ROOT:-/data/liferadar}/outlook-token-cache:/app/outlook-token-cache
    expose:
      - "8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - coolify
    restart: unless-stopped
    depends_on:
      - liferadar-api
      - liferadar-chat-gateway

  liferadar-worker:
    build:
      context: .
      dockerfile: Dockerfile.matrix-services
      target: worker-runtime
    container_name: liferadar-worker
    environment:
      LIFERADAR_DB_HOST: "${LIFERADAR_DB_HOST}"
      LIFERADAR_DB_PORT: "${LIFERADAR_DB_PORT}"
      LIFERADAR_DB_NAME: "${LIFERADAR_DB_NAME}"
      LIFERADAR_DB_USER: "${LIFERADAR_DB_USER}"
      LIFERADAR_DB_PASSWORD: "${LIFERADAR_DB_PASSWORD}"
      MATRIX_SESSION_PATH: "${MATRIX_SESSION_PATH}"
      MATRIX_RUST_SESSION_PATH: "${MATRIX_RUST_SESSION_PATH}"
      MATRIX_RUST_STORE: "${MATRIX_RUST_STORE}"
      MATRIX_ROOM_KEYS_PATH: "${MATRIX_ROOM_KEYS_PATH}"
      MATRIX_ROOM_KEYS_PASSPHRASE_PATH: "${MATRIX_ROOM_KEYS_PASSPHRASE_PATH}"
      MATRIX_RUST_KEY_IMPORT_MARKER: "${MATRIX_RUST_KEY_IMPORT_MARKER}"
      LIFERADAR_MATRIX_RUST_CANDIDATE_ID: "${LIFERADAR_MATRIX_RUST_CANDIDATE_ID}"
      LIFERADAR_MATRIX_RUST_CANDIDATE_TYPE: "${LIFERADAR_MATRIX_RUST_CANDIDATE_TYPE}"
      LIFERADAR_MATRIX_RUST_TIMEOUT_SEC: "${LIFERADAR_MATRIX_RUST_TIMEOUT_SEC}"
      LIFERADAR_MATRIX_RUST_RECOVER_HTTP_ON_FAILURE: "${LIFERADAR_MATRIX_RUST_RECOVER_HTTP_ON_FAILURE}"
      LIFERADAR_MATRIX_ENABLED: "${LIFERADAR_MATRIX_ENABLED:-true}"
      LIFERADAR_MATRIX_HOMESERVER_URL: "${LIFERADAR_MATRIX_HOMESERVER_URL}"
      MSGRAPH_CLIENT_ID: "${MSGRAPH_CLIENT_ID}"
      MSGRAPH_CLIENT_SECRET: "${MSGRAPH_CLIENT_SECRET}"
      MSGRAPH_TENANT_ID: "${MSGRAPH_TENANT_ID}"
      MSGRAPH_REFRESH_TOKEN: "${MSGRAPH_REFRESH_TOKEN}"
      GOOGLE_CALENDAR_CLIENT_ID: "${GOOGLE_CALENDAR_CLIENT_ID}"
      GOOGLE_CALENDAR_CLIENT_SECRET: "${GOOGLE_CALENDAR_CLIENT_SECRET}"
      GOOGLE_CALENDAR_REFRESH_TOKEN: "${GOOGLE_CALENDAR_REFRESH_TOKEN}"
      GOOGLE_CALENDAR_ID: "${GOOGLE_CALENDAR_ID}"
    expose:
      - "8080"
    volumes:
      - ${LIFERADAR_DATA_ROOT:-/data/liferadar}/identity:/app/identity
      - ${LIFERADAR_DATA_ROOT:-/data/liferadar}/workspace:/app/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - coolify
    restart: unless-stopped

  liferadar-chat-gateway:
    build:
      context: .
      dockerfile: Dockerfile.chat-gateway
    container_name: liferadar-chat-gateway
    environment:
      LIFERADAR_DB_HOST: "${LIFERADAR_DB_HOST}"
      LIFERADAR_DB_PORT: "${LIFERADAR_DB_PORT}"
      LIFERADAR_DB_NAME: "${LIFERADAR_DB_NAME}"
      LIFERADAR_DB_USER: "${LIFERADAR_DB_USER}"
      LIFERADAR_DB_PASSWORD: "${LIFERADAR_DB_PASSWORD}"
      LIFERADAR_CONNECTOR_SESSION_DIR: /app/connectors
      LIFERADAR_CHAT_GATEWAY_PORT: 8020
      LIFERADAR_TELEGRAM_ENABLED: "${LIFERADAR_TELEGRAM_ENABLED}"
      LIFERADAR_WHATSAPP_ENABLED: "${LIFERADAR_WHATSAPP_ENABLED}"
      LIFERADAR_WHATSAPP_UNOFFICIAL_ALLOWED: "${LIFERADAR_WHATSAPP_UNOFFICIAL_ALLOWED}"
      TELEGRAM_API_ID: "${TELEGRAM_API_ID}"
      TELEGRAM_API_HASH: "${TELEGRAM_API_HASH}"
      LIFERADAR_CONNECTOR_BACKFILL_LIMIT_PER_CHAT: "${LIFERADAR_CONNECTOR_BACKFILL_LIMIT_PER_CHAT}"
    volumes:
      - ${LIFERADAR_DATA_ROOT:-/data/liferadar}/connectors:/app/connectors
    expose:
      - "8020"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - coolify
    restart: unless-stopped

  liferadar-matrix-bridge:
    build:
      context: .
      dockerfile: Dockerfile.matrix-services
      target: matrix-bridge-runtime
    container_name: liferadar-matrix-bridge
    environment:
      LIFERADAR_DB_HOST: "${LIFERADAR_DB_HOST}"
      LIFERADAR_DB_PORT: "${LIFERADAR_DB_PORT}"
      LIFERADAR_DB_NAME: "${LIFERADAR_DB_NAME}"
      LIFERADAR_DB_USER: "${LIFERADAR_DB_USER}"
      LIFERADAR_DB_PASSWORD: "${LIFERADAR_DB_PASSWORD}"
    volumes:
      - ${LIFERADAR_DATA_ROOT:-/data/liferadar}/identity:/app/identity
    expose:
      - "8010"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - coolify
    restart: unless-stopped

networks:
  coolify:
    external: true
    name: coolify
