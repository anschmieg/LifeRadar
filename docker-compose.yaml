# Uses named volumes with driver_opts to avoid Coolify's replaceLocalSource()
# rewriting host paths (see applicationParser in Coolify's parsers.php).
# Bind mounts like /data/life-radar/identity:/app/identity get rewritten by
# Coolify to its own managed path; named volumes with driver_opts do not.

services:
  life-radar-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: life-radar-api
    environment:
      LIFE_RADAR_DB_HOST: "${LIFE_RADAR_DB_HOST}"
      LIFE_RADAR_DB_PORT: "${LIFE_RADAR_DB_PORT}"
      LIFE_RADAR_DB_NAME: "${LIFE_RADAR_DB_NAME}"
      LIFE_RADAR_DB_USER: "${LIFE_RADAR_DB_USER}"
      LIFE_RADAR_DB_PASSWORD: "${LIFE_RADAR_DB_PASSWORD}"
      LIFE_RADAR_API_KEY: "${LIFE_RADAR_API_KEY}"
      LIFE_RADAR_MATRIX_BRIDGE_URL: http://life-radar-matrix-bridge:8010
    expose:
      - "8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.liferadar-compose-api.rule=Host(`liferadar.nothing.pink`)"
      - "traefik.http.routers.liferadar-compose-api.entrypoints=https"
      - "traefik.http.routers.liferadar-compose-api.tls=true"
      - "traefik.http.routers.liferadar-compose-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.liferadar-compose-api.loadbalancer.server.port=8000"
      - "traefik.docker.network=coolify"
    networks:
      - coolify
    restart: unless-stopped

  life-radar-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: life-radar-mcp
    environment:
      LIFE_RADAR_DB_HOST: "${LIFE_RADAR_DB_HOST}"
      LIFE_RADAR_DB_PORT: "${LIFE_RADAR_DB_PORT}"
      LIFE_RADAR_DB_NAME: "${LIFE_RADAR_DB_NAME}"
      LIFE_RADAR_DB_USER: "${LIFE_RADAR_DB_USER}"
      LIFE_RADAR_DB_PASSWORD: "${LIFE_RADAR_DB_PASSWORD}"
      LIFE_RADAR_API_URL: http://life-radar-api:8000
      LIFE_RADAR_PUBLIC_API_URL: "${LIFE_RADAR_PUBLIC_API_URL}"
      LIFE_RADAR_API_KEY: "${LIFE_RADAR_API_KEY}"
      OUTLOOK_MCP_ENABLED: "${OUTLOOK_MCP_ENABLED}"
      MSGRAPH_CLIENT_ID: "${MSGRAPH_CLIENT_ID}"
      MSGRAPH_CLIENT_SECRET: "${MSGRAPH_CLIENT_SECRET}"
      MSGRAPH_TENANT_ID: "${MSGRAPH_TENANT_ID}"
    volumes:
      - outlook-mcp-tokens:/app/outlook-token-cache
    expose:
      - "8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - coolify
    restart: unless-stopped
    depends_on:
      - life-radar-api

  life-radar-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: life-radar-worker
    environment:
      LIFE_RADAR_DB_HOST: "${LIFE_RADAR_DB_HOST}"
      LIFE_RADAR_DB_PORT: "${LIFE_RADAR_DB_PORT}"
      LIFE_RADAR_DB_NAME: "${LIFE_RADAR_DB_NAME}"
      LIFE_RADAR_DB_USER: "${LIFE_RADAR_DB_USER}"
      LIFE_RADAR_DB_PASSWORD: "${LIFE_RADAR_DB_PASSWORD}"
      MATRIX_SESSION_PATH: "${MATRIX_SESSION_PATH}"
      MATRIX_RUST_SESSION_PATH: "${MATRIX_RUST_SESSION_PATH}"
      MATRIX_RUST_STORE: "${MATRIX_RUST_STORE}"
      MATRIX_E2EE_EXPORT_PATH: "${MATRIX_E2EE_EXPORT_PATH}"
      MATRIX_E2EE_EXPORT_PASSPHRASE_PATH: "${MATRIX_E2EE_EXPORT_PASSPHRASE_PATH}"
      MATRIX_RUST_KEY_IMPORT_MARKER: "${MATRIX_RUST_KEY_IMPORT_MARKER}"
      LIFE_RADAR_MATRIX_RUST_CANDIDATE_ID: "${LIFE_RADAR_MATRIX_RUST_CANDIDATE_ID}"
      LIFE_RADAR_MATRIX_RUST_CANDIDATE_TYPE: "${LIFE_RADAR_MATRIX_RUST_CANDIDATE_TYPE}"
      LIFE_RADAR_MATRIX_RUST_TIMEOUT_SEC: "${LIFE_RADAR_MATRIX_RUST_TIMEOUT_SEC}"
      LIFE_RADAR_MATRIX_RUST_RECOVER_HTTP_ON_FAILURE: "${LIFE_RADAR_MATRIX_RUST_RECOVER_HTTP_ON_FAILURE}"
      MSGRAPH_CLIENT_ID: "${MSGRAPH_CLIENT_ID}"
      MSGRAPH_CLIENT_SECRET: "${MSGRAPH_CLIENT_SECRET}"
      MSGRAPH_TENANT_ID: "${MSGRAPH_TENANT_ID}"
      MSGRAPH_REFRESH_TOKEN: "${MSGRAPH_REFRESH_TOKEN}"
      GOOGLE_CALENDAR_CLIENT_ID: "${GOOGLE_CALENDAR_CLIENT_ID}"
      GOOGLE_CALENDAR_CLIENT_SECRET: "${GOOGLE_CALENDAR_CLIENT_SECRET}"
      GOOGLE_CALENDAR_REFRESH_TOKEN: "${GOOGLE_CALENDAR_REFRESH_TOKEN}"
      GOOGLE_CALENDAR_ID: "${GOOGLE_CALENDAR_ID}"
    expose:
      - "8080"
    volumes:
      - life-radar-identity:/app/identity
      - life-radar-workspace:/app/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - coolify
    restart: unless-stopped

  life-radar-matrix-bridge:
    build:
      context: .
      dockerfile: Dockerfile.matrix-bridge
    container_name: life-radar-matrix-bridge
    environment:
      LIFE_RADAR_DB_HOST: "${LIFE_RADAR_DB_HOST}"
      LIFE_RADAR_DB_PORT: "${LIFE_RADAR_DB_PORT}"
      LIFE_RADAR_DB_NAME: "${LIFE_RADAR_DB_NAME}"
      LIFE_RADAR_DB_USER: "${LIFE_RADAR_DB_USER}"
      LIFE_RADAR_DB_PASSWORD: "${LIFE_RADAR_DB_PASSWORD}"
    volumes:
      - life-radar-identity:/app/identity
    expose:
      - "8010"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - coolify
    restart: unless-stopped

volumes:
  outlook-mcp-tokens:
  life-radar-identity:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/life-radar/identity
  life-radar-workspace:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/life-radar/workspace

networks:
  coolify:
    external: true
    name: coolify