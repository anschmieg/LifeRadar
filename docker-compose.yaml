# Production deployment uses explicit host bind mounts under /data/liferadar.
# Local development should use docker-compose.local.yaml instead.

services:
  liferadar-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: liferadar-api
    environment:
      LIFERADAR_DB_HOST: "${LIFERADAR_DB_HOST}"
      LIFERADAR_DB_PORT: "${LIFERADAR_DB_PORT}"
      LIFERADAR_DB_NAME: "${LIFERADAR_DB_NAME}"
      LIFERADAR_DB_USER: "${LIFERADAR_DB_USER}"
      LIFERADAR_DB_PASSWORD: "${LIFERADAR_DB_PASSWORD}"
      LIFERADAR_API_KEY: "${LIFERADAR_API_KEY}"
      LIFERADAR_MESSAGING_RUNTIME_URL: http://liferadar-messaging-runtime:8030
      LIFERADAR_MATRIX_ENABLED: "${LIFERADAR_MATRIX_ENABLED:-false}"
      LIFERADAR_MATRIX_HOMESERVER_URL: "${LIFERADAR_MATRIX_HOMESERVER_URL:-}"
      MATRIX_RUST_SESSION_PATH: "${MATRIX_RUST_SESSION_PATH:-/app/identity/matrix-session.json}"
      MATRIX_RUST_STORE: "${MATRIX_RUST_STORE:-/app/identity/matrix-rust-sdk-store}"
    volumes:
      - ${LIFERADAR_DATA_ROOT:-/data/liferadar}/identity:/app/identity
    expose:
      - "8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.liferadar-compose-api.rule=Host(`liferadar.nothing.pink`)"
      - "traefik.http.routers.liferadar-compose-api.entrypoints=https"
      - "traefik.http.routers.liferadar-compose-api.tls=true"
      - "traefik.http.routers.liferadar-compose-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.liferadar-compose-api.loadbalancer.server.port=8000"
      - "traefik.docker.network=coolify"
    networks:
      - coolify
    restart: unless-stopped
    depends_on:
      - liferadar-messaging-runtime
    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - http://127.0.0.1:8000/health
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  liferadar-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: liferadar-mcp
    environment:
      LIFERADAR_DB_HOST: "${LIFERADAR_DB_HOST}"
      LIFERADAR_DB_PORT: "${LIFERADAR_DB_PORT}"
      LIFERADAR_DB_NAME: "${LIFERADAR_DB_NAME}"
      LIFERADAR_DB_USER: "${LIFERADAR_DB_USER}"
      LIFERADAR_DB_PASSWORD: "${LIFERADAR_DB_PASSWORD}"
      LIFERADAR_API_URL: http://liferadar-api:8000
      LIFERADAR_PUBLIC_API_URL: "${LIFERADAR_PUBLIC_API_URL}"
      LIFERADAR_API_KEY: "${LIFERADAR_API_KEY}"
      OUTLOOK_MCP_ENABLED: "${OUTLOOK_MCP_ENABLED}"
      MSGRAPH_CLIENT_ID: "${MSGRAPH_CLIENT_ID}"
      MSGRAPH_CLIENT_SECRET: "${MSGRAPH_CLIENT_SECRET}"
      MSGRAPH_TENANT_ID: "${MSGRAPH_TENANT_ID}"
    volumes:
      - ${LIFERADAR_DATA_ROOT:-/data/liferadar}/outlook-token-cache:/app/outlook-token-cache
    expose:
      - "8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - coolify
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      - liferadar-api
      - liferadar-messaging-runtime

  liferadar-beeper-sidecar:
    build:
      context: .
      dockerfile: Dockerfile.beeper-sidecar
      args:
        BEEPER_APPIMAGE_URL: "${BEEPER_APPIMAGE_URL:-https://api.beeper.com/desktop/download/linux/arm64/stable/com.automattic.beeper.desktop}"
    container_name: liferadar-beeper-sidecar
    environment:
      DISPLAY: ":99"
      BEEPER_DISABLE_GPU: "${BEEPER_DISABLE_GPU:-true}"
      BEEPER_VNC_ENABLED: "${BEEPER_VNC_ENABLED:-false}"
      BEEPER_NOVNC_ENABLED: "${BEEPER_NOVNC_ENABLED:-false}"
      BEEPER_VNC_PORT: 5900
      BEEPER_NOVNC_PORT: 6080
    volumes:
      - ${LIFERADAR_DATA_ROOT:-/data/liferadar}/beeper-home:/data/beeper-home
    expose:
      - "23373"
      - "5900"
      - "6080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      coolify:
        aliases:
          - liferadar-beeper-sidecar
    restart: unless-stopped

  liferadar-messaging-runtime:
    build:
      context: .
      dockerfile: Dockerfile.messaging-runtime
    container_name: liferadar-messaging-runtime
    environment:
      LIFERADAR_DB_HOST: "${LIFERADAR_DB_HOST}"
      LIFERADAR_DB_PORT: "${LIFERADAR_DB_PORT}"
      LIFERADAR_DB_NAME: "${LIFERADAR_DB_NAME}"
      LIFERADAR_DB_USER: "${LIFERADAR_DB_USER}"
      LIFERADAR_DB_PASSWORD: "${LIFERADAR_DB_PASSWORD}"
      BEEPER_DESKTOP_BASE_URL: http://liferadar-beeper-sidecar:23373
      BEEPER_ACCESS_TOKEN: "${BEEPER_ACCESS_TOKEN}"
      LIFERADAR_MESSAGING_RUNTIME_PORT: 8030
      LIFERADAR_BEEPER_SYNC_INTERVAL: "${LIFERADAR_BEEPER_SYNC_INTERVAL:-10m}"
      LIFERADAR_BEEPER_BACKFILL_PAGE_LIMIT: "${LIFERADAR_BEEPER_BACKFILL_PAGE_LIMIT:-100}"
      LIFERADAR_BEEPER_BACKFILL_CHAT_LIMIT: "${LIFERADAR_BEEPER_BACKFILL_CHAT_LIMIT:-250}"
      LIFERADAR_BEEPER_BACKFILL_MESSAGE_LIMIT: "${LIFERADAR_BEEPER_BACKFILL_MESSAGE_LIMIT:-2000}"
    expose:
      - "8030"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      coolify:
        aliases:
          - liferadar-messaging-runtime
    restart: unless-stopped
    depends_on:
      - liferadar-beeper-sidecar

  liferadar-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: liferadar-worker
    environment:
      LIFERADAR_DB_HOST: "${LIFERADAR_DB_HOST}"
      LIFERADAR_DB_PORT: "${LIFERADAR_DB_PORT}"
      LIFERADAR_DB_NAME: "${LIFERADAR_DB_NAME}"
      LIFERADAR_DB_USER: "${LIFERADAR_DB_USER}"
      LIFERADAR_DB_PASSWORD: "${LIFERADAR_DB_PASSWORD}"
      MATRIX_SESSION_PATH: "${MATRIX_SESSION_PATH:-/app/identity/matrix-session.json}"
      MATRIX_RUST_SESSION_PATH: "${MATRIX_RUST_SESSION_PATH:-/app/identity/matrix-session.json}"
      MATRIX_RUST_STORE: "${MATRIX_RUST_STORE:-/app/identity/matrix-rust-sdk-store}"
      MATRIX_ROOM_KEYS_PATH: "${MATRIX_ROOM_KEYS_PATH:-/app/identity/matrix-e2e-keys.txt}"
      MATRIX_ROOM_KEYS_PASSPHRASE_PATH: "${MATRIX_ROOM_KEYS_PASSPHRASE_PATH:-/app/identity/.e2e-keys-passphrase}"
      MATRIX_RUST_KEY_IMPORT_MARKER: "${MATRIX_RUST_KEY_IMPORT_MARKER:-/app/identity/matrix-rust-sdk-store/room-key-import-marker.json}"
      LIFERADAR_MATRIX_RUST_CANDIDATE_ID: "${LIFERADAR_MATRIX_RUST_CANDIDATE_ID:-}"
      LIFERADAR_MATRIX_RUST_CANDIDATE_TYPE: "${LIFERADAR_MATRIX_RUST_CANDIDATE_TYPE:-}"
      LIFERADAR_MATRIX_RUST_TIMEOUT_SEC: "${LIFERADAR_MATRIX_RUST_TIMEOUT_SEC:-20}"
      LIFERADAR_MATRIX_RUST_RECOVER_HTTP_ON_FAILURE: "${LIFERADAR_MATRIX_RUST_RECOVER_HTTP_ON_FAILURE:-0}"
      LIFERADAR_MATRIX_ENABLED: "${LIFERADAR_MATRIX_ENABLED:-false}"
      LIFERADAR_MATRIX_HOMESERVER_URL: "${LIFERADAR_MATRIX_HOMESERVER_URL:-}"
      LIFERADAR_MATRIX_LEGACY_IMPORT_ENABLED: "${LIFERADAR_MATRIX_LEGACY_IMPORT_ENABLED:-false}"
      LIFERADAR_MSGRAPH_ENABLED: "${LIFERADAR_MSGRAPH_ENABLED:-true}"
      LIFERADAR_GOOGLE_CALENDAR_ENABLED: "${LIFERADAR_GOOGLE_CALENDAR_ENABLED:-true}"
      MSGRAPH_CLIENT_ID: "${MSGRAPH_CLIENT_ID:-}"
      MSGRAPH_CLIENT_SECRET: "${MSGRAPH_CLIENT_SECRET:-}"
      MSGRAPH_TENANT_ID: "${MSGRAPH_TENANT_ID:-common}"
      MSGRAPH_REFRESH_TOKEN: "${MSGRAPH_REFRESH_TOKEN:-}"
      GOOGLE_CALENDAR_CLIENT_ID: "${GOOGLE_CALENDAR_CLIENT_ID:-}"
      GOOGLE_CALENDAR_CLIENT_SECRET: "${GOOGLE_CALENDAR_CLIENT_SECRET:-}"
      GOOGLE_CALENDAR_REFRESH_TOKEN: "${GOOGLE_CALENDAR_REFRESH_TOKEN:-}"
      GOOGLE_CALENDAR_ID: "${GOOGLE_CALENDAR_ID:-primary}"
    expose:
      - "8080"
    volumes:
      - ${LIFERADAR_DATA_ROOT:-/data/liferadar}/identity:/app/identity
      - ${LIFERADAR_DATA_ROOT:-/data/liferadar}/workspace:/app/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - coolify
    restart: unless-stopped

networks:
  coolify:
    external: true
    name: coolify
